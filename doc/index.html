<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>crabclaw docs</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; display: grid; place-items: center; min-height: 100vh; background: #0b0b0b; color: #eaeaea; }
    .card { width: 92%; max-width: 860px; padding: 32px; border-radius: 16px; background: #121212; border: 1px solid #242424; box-shadow: 0 10px 30px rgba(0,0,0,.35); }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: .3px; }
    .slogan { margin: 6px 0 22px; font-size: 16px; color: #9ad4ff; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
    a.btn { display: block; padding: 16px; text-align: center; border-radius: 12px; text-decoration: none; font-weight: 600; border: 1px solid #2a2a2a; }
    a.btn.en { background: #0d1b2a; color: #b9dfff; }
    a.btn.zh { background: #1a0d2a; color: #e3c3ff; }
    .links { margin-top: 20px; display: grid; gap: 10px; }
    .links a { color: #bdbdbd; text-decoration: none; }
    .links a:hover { color: #ffffff; }
  </style>
</head>
<body>
  <main class="card">
    <h1>crabclaw docs</h1>
    <div class="slogan">Two hearts, one mind.</div>
    <div class="grid">
      <a class="btn en" href="./en/index.html">English</a>
      <a class="btn zh" href="./zh-CN/index.html">中文</a>
    </div>
    <div class="links">
      <a href="https://github.com/DahaiCAO/crabclaw">GitHub</a>
      <a href="https://pypi.org/project/crabclaw-ai/">PyPI</a>
    </div>
  </main>
</body>
 </html>
