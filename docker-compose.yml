x-common-config: &common-config
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ~/.crabclaw:/root/.crabclaw
  restart: unless-stopped

services:
  crabclaw-gateway:
    container_name: crabclaw-gateway
    <<: *common-config
    command: ["gateway"]
    ports:
      - "18790:18790"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  crabclaw-dashboard:
    container_name: crabclaw-dashboard
    <<: *common-config
    command: ["dashboard"]
    ports:
      - "18791:18791"
      - "18792:18792"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  crabclaw-cli:
    <<: *common-config
    profiles:
      - cli
    command: ["status"]
    stdin_open: true
    tty: true
